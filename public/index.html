<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>p5.js Sketch Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>p5.js Sketch Gallery</h1>
    <p>Add folders to <code>sketches/</code> to see them appear here.</p>
  </header>
  <main id="gallery"></main>
  <script>
    fetch('/api/sketches')
      .then(r => r.json())
      .then(sketches => {
        const gallery = document.getElementById('gallery');
        if (sketches.length === 0) {
          gallery.innerHTML = '<p class="empty">No sketches yet. Copy the <code>hello-world</code> folder inside <code>sketches/</code> to get started.</p>';
          return;
        }
        sketches.forEach(s => {
          const card = document.createElement('a');
          card.href = s.url;
          card.className = 'card';
          card.textContent = s.name;
          gallery.appendChild(card);
        });
      })
      .catch(() => {
        document.getElementById('gallery').innerHTML = '<p class="empty">Could not load sketches.</p>';
      });
  </script>
</body>
</html>
